<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Archivo','Segoe UI',sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#0f4c39"/>
      <stop offset="70%" stop-color="#082b20"/>
      <stop offset="100%" stop-color="#061d16"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- chalk lines -->
  <g stroke="#16614a" stroke-width="2" fill="none" opacity=".7">
    <rect x="60" y="60" width="1080" height="510" rx="4"/>
    <line x1="600" y1="60" x2="600" y2="570"/>
    <circle cx="600" cy="315" r="78"/>
  </g>

  <text x="84" y="150" fill="#e9b64b" font-family="'IBM Plex Mono',monospace" font-size="22" letter-spacing="8">FIFA WORLD CUP 26 · CAN · MEX · USA</text>
  <text x="80" y="270" fill="#f3efe2" font-size="104" font-weight="900" letter-spacing="-2">KNOCKOUT</text>
  <text x="80" y="380" fill="#e9b64b" font-size="104" font-weight="900" letter-spacing="-2">BRACKET</text>

  <text x="84" y="450" fill="#bcae8e" font-family="'Archivo Narrow',sans-serif" font-size="30">Tap to advance · picks save to the URL · share your bracket</text>

  <!-- scoring chips -->
  <g font-family="'IBM Plex Mono',monospace" font-size="24" font-weight="600">
    <g>
      <rect x="84" y="486" width="118" height="48" rx="24" fill="#0e4c39" stroke="#16614a"/>
      <text x="143" y="517" fill="#f3efe2" text-anchor="middle">R32·1</text>
    </g>
    <g>
      <rect x="214" y="486" width="118" height="48" rx="24" fill="#0e4c39" stroke="#16614a"/>
      <text x="273" y="517" fill="#f3efe2" text-anchor="middle">R16·2</text>
    </g>
    <g>
      <rect x="344" y="486" width="106" height="48" rx="24" fill="#0e4c39" stroke="#16614a"/>
      <text x="397" y="517" fill="#f3efe2" text-anchor="middle">QF·4</text>
    </g>
    <g>
      <rect x="462" y="486" width="104" height="48" rx="24" fill="#0e4c39" stroke="#16614a"/>
      <text x="514" y="517" fill="#f3efe2" text-anchor="middle">SF·8</text>
    </g>
    <g>
      <rect x="578" y="486" width="106" height="48" rx="24" fill="#e9b64b"/>
      <text x="631" y="517" fill="#06251b" text-anchor="middle">F·16</text>
    </g>
  </g>

  <text x="1116" y="540" fill="#e9b64b" font-size="160" text-anchor="end">🏆</text>
</svg>
